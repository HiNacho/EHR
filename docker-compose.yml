version: '3.8'

services:
  db:
    image: postgres:15
    container_name: nacho_ehr_postgres
    restart: always
    environment:
      POSTGRES_DB: nacho_ehr_db
      POSTGRES_USER: ehr_user
      POSTGRES_PASSWORD: ehr_password
    ports:
      - "5432:5432"
    volumes:
      - ehr_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: nacho_ehr_backend
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
    ports:
      - "8001:8000"
    depends_on:
      - db
    environment:
      - DEBUG=1
      - DJANGO_DB_HOST=db
      - DJANGO_DB_NAME=nacho_ehr_db
      - DJANGO_DB_USER=ehr_user
      - DJANGO_DB_PASSWORD=ehr_password

  frontend:
    build:
      context: ./frontend
    container_name: nacho_ehr_frontend
    command: sh -c "npm install && npm run dev -- --host"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  ehr_pgdata:
